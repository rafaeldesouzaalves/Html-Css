<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love Larry';
            src: url('fontes/love larry ttf.ttf')format('truetype');
            font-weight: normal;
            font-style: normal;

             /* 
             Tipos de Format()
             - openType (otf)
             - trueType(ttf)
             - embedded OpenType (eot)
             - trueType-aat (apple advanced typography)
             - Scalable Vector Graphics (svg)
            */
 
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: love larry, cursive;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptate sequi adipisci reiciendis possimus modi voluptas doloremque vero odio exercitationem molestias, repellat, reprehenderit blanditiis facere! Incidunt corporis a blanditiis dolorum. Quaerat.</p>
</body>
</html>
