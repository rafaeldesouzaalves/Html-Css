<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor experiência.</p>
    <picture>
        <source media="(max-width: 600px)" srcset="paisagem-p.png">
        <source media="(max-width: 1000px)" srcset="paisagem-m.png">
        <img src="paisagem-g.png" alt="Paisagem">
    </picture>
</body>
</html>
